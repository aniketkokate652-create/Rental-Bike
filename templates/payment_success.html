{% extends "base.html" %}
{% block content %}
<div class="auth-wrapper" style="padding-top: 120px;">
    <div class="glass-card text-center" style="max-width: 600px; width: 100%; padding: 60px 40px;">
        
        <div style="width: 80px; height: 80px; background: rgba(34, 197, 94, 0.1); color: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; margin: 0 auto 24px;">
            <i class="fa-solid fa-check"></i>
        </div>
        
        <h1 style="color: var(--primary); margin-bottom: 16px;">Payment Successful!</h1>
        <p style="color: var(--text-muted); font-size: 1.1rem; margin-bottom: 40px;">
            You have successfully rented the <strong style="color: var(--text-main);">{{ bike.model_name }}</strong>. Your ride is ready for you.
        </p>
        
        <div style="display: flex; gap: 16px; justify-content: center;">
            <a href="/bikes" class="btn btn-outline">Back to Bikes</a>
            <a href="/my-bookings" class="btn btn-accent">View My Bookings</a>
        </div>
        
    </div>
</div>
{% endblock %}
