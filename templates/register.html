{% extends "base.html" %}

{% block title %}Register | Riddo{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="text-center" style="margin-bottom: 40px;">
            <h2 style="font-size: 2rem; color: var(--primary); margin-bottom: 8px;">Create Account</h2>
            <p style="color: var(--text-muted);">Join Riddo and start riding</p>
        </div>

        {% if error %}
        <div class="error-msg">
            <i class="fa-solid fa-circle-exclamation"></i>
            <span>{{ error }}</span>
        </div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <input type="text" name="username" class="form-control" placeholder=" " required>
                <label class="floating-label">Choose a Username</label>
            </div>

            <div class="form-group">
                <input type="email" name="email" class="form-control" placeholder=" " required>
                <label class="floating-label">Email Address</label>
            </div>
            
            <div class="form-group">
                <input type="password" name="password" class="form-control" placeholder=" " required>
                <label class="floating-label">Create Password</label>
            </div>
            
            <button type="submit" class="btn btn-accent" style="width: 100%; margin-top: 16px;">Create Account</button>
        </form>
        
        <p class="text-center" style="margin-top: 24px; color: var(--text-muted); font-size: 0.95rem;">
            Already have an account? <a href="/login" style="color: var(--primary); font-weight: 600;">Log in</a>
        </p>
    </div>
</div>
{% endblock %}
