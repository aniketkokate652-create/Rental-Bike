{% extends "base.html" %}
{% block content %}

<div class="container section-padding" style="padding-top: 120px;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
        <h2 class="section-title" style="margin-bottom: 0;">Available Bikes</h2>
    </div>

    <div class="grid-3">
    {% for bike in bikes %}
        <div class="glass-card" style="padding: 0; overflow: hidden; display: flex; flex-direction: column;">
            
            <div style="position: relative; height: 220px; background: #e2e8f0; display: flex; align-items: center; justify-content: center;">
                {% if bike.image_file %}
                    <img src="{{ url_for('static', filename='uploads/' + bike.image_file) }}" alt="{{ bike.model_name }}" style="width: 100%; height: 100%; object-fit: cover;">
                {% else %}
                    <i class="fa-solid fa-motorcycle" style="font-size: 4rem; color: #cbd5e1;"></i>
                {% endif %}
                
                <div style="position: absolute; top: 16px; right: 16px; background: var(--white); padding: 6px 16px; border-radius: 50px; font-weight: 700; box-shadow: var(--shadow-sm);">
                    ₹{{ bike.price_per_day }}<span style="font-size: 0.8rem; color: var(--text-muted); font-weight: 500;">/day</span>
                </div>
            </div>
            
            <div style="padding: 24px; display: flex; flex-direction: column; flex-grow: 1;">
                <h3 style="font-size: 1.25rem; margin-bottom: 24px;">{{ bike.model_name }}</h3>
                
                <div style="margin-top: auto;">
                    <form method="POST" action="{{ url_for('rental.rent_bike', bike_id=bike.id) }}">
                        <button class="btn btn-primary" style="width: 100%; background: var(--primary); color: white;">Rent Now</button>
                    </form>
                </div>
            </div>
            
        </div>
    {% endfor %}
    </div>
</div>

{% endblock %}
