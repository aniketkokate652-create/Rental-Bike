{% extends "base.html" %}
{% block content %}

<div class="container">
    <div class="fleet-header">
        <h2 style="font-size: 3rem; font-weight: 800; color: #f8f2f2; line-height: 1;">Our Fleet</h2>
        <p style="font-size: 1.1rem; color: #64748b; margin-top: 10px;">Premium motorcycles ready for your next journey.</p>
    </div>

    <div class="grid-3" style="padding-bottom: 80px;">
    {% for bike in bikes %}
        <div class="glass-card" style="height: 100%; display: flex; flex-direction: column;">
            
            <div class="card-image-wrapper" style="height: 240px; position: relative; overflow: hidden; border-radius: 16px 16px 0 0;">
                {% if bike.image_file %}
                    <img src="{{ url_for('static', filename='uploads/' + bike.image_file) }}" alt="{{ bike.model_name }}" style="width: 100%; height: 100%; object-fit: cover;">
                {% else %}
                    <div style="background: #f1f5f9; height: 100%; display: flex; align-items: center; justify-content: center;">
                        <i class="fa-solid fa-motorcycle" style="font-size: 4rem; color: #cbd5e1;"></i>
                    </div>
                {% endif %}
                
                <div style="position: absolute; bottom: 15px; left: 15px; background: rgba(15, 23, 42, 0.9); color: white; padding: 6px 14px; border-radius: 8px; font-weight: 700;">
                    ₹{{ bike.price_per_day }}<small style="opacity: 0.7; font-weight: 400;">/day</small>
                </div>
            </div>
            
            <div style="padding: 24px; flex-grow: 1; display: flex; flex-direction: column;">
                <h3 style="font-size: 1.4rem; margin-bottom: 15px; color: #0f172a;">{{ bike.model_name }}</h3>
                
                <div style="display: flex; gap: 10px; margin-bottom: 25px;">
                    <span style="font-size: 0.75rem; background: #fff1f2; color: #e11d48; padding: 5px 10px; border-radius: 6px; font-weight: 700;">FASTEST</span>
                    <span style="font-size: 0.75rem; background: #f0fdf4; color: #166534; padding: 5px 10px; border-radius: 6px; font-weight: 700;">AVAILABLE</span>
                </div>
                
                <div style="margin-top: auto;">
                    <form method="POST" action="{{ url_for('rental.rent_bike', bike_id=bike.id) }}">
                        <button type="submit" class="btn-rent-now">
                            <i class="fa-solid fa-bolt" style="margin-right: 8px;"></i>Rent Now
                        </button>
                    </form>
                </div>
            </div>
            
        </div>
    {% endfor %}
    </div>
</div>

{% endblock %}
