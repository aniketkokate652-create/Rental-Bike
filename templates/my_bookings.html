{% extends "base.html" %}
{% block content %}

<div class="container mt-5">
    <h3>My Bookings</h3>

    {% if bookings %}
        <table class="table">
            <thead>
                <tr>
                    <th>Bike ID</th>
                    <th>Price</th>
                    <th>Payment</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                {% for b in bookings %}
                <tr>
                    <td>{{ b.bike_id }}</td>
                    <td>₹{{ b.total_price }}</td>
                    <td>{{ b.payment_method }}</td>
                    <td>{{ b.payment_status }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    {% else %}
        <p>No bookings found.</p>
    {% endif %}
</div>

{% endblock %}
