{% extends "base.html" %}

{% block title %}Login | Riddo{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="text-center" style="margin-bottom: 40px;">
            <h2 style="font-size: 2rem; color: var(--primary); margin-bottom: 8px;">Welcome Back</h2>
            <p style="color: var(--text-muted);">Sign in to manage your rides</p>
        </div>

        {% if error %}
        <div class="error-msg">
            <i class="fa-solid fa-circle-exclamation"></i>
            <span>{{ error }}</span>
        </div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <input type="text" name="username" class="form-control" placeholder=" " required>
                <label class="floating-label">Username</label>
            </div>
            
            <div class="form-group">
                <input type="password" name="password" class="form-control" placeholder=" " required>
                <label class="floating-label">Password</label>
            </div>
            
            <button type="submit" class="btn btn-accent" style="width: 100%; margin-top: 16px;">Sign In</button>
        </form>
        
        <p class="text-center" style="margin-top: 24px; color: var(--text-muted); font-size: 0.95rem;">
            Don't have an account? <a href="/register" style="color: var(--accent); font-weight: 600;">Sign up</a>
        </p>
    </div>
</div>
{% endblock %}
