{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4>Step 1: Your Information</h4>
            </div>
            <div class="card-body">
                <h5>Renting: {{ bike.model_name }}</h5>
                <p class="text-muted">Price: ₹{{ bike.price_per_day }} / day</p>
                
                <form method="POST" action="{{ url_for('rental.user_info', bike_id=bike.id) }}">
                    
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="form-control" value="{{ user.username }}" readonly>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Email Address</label>
                        <input type="email" name="email" class="form-control" value="{{ user.email }}" readonly>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Phone Number</label>
                        <input type="tel" name="phone" class="form-control" placeholder="Enter your mobile number" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Proceed to Payment</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
