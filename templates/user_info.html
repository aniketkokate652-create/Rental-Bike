{% extends "base.html" %}
{% block content %}
<div class="auth-wrapper" style="padding-top: 120px;">
    <div class="auth-card" style="max-width: 500px;">
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; border-bottom: 1px solid #e2e8f0; padding-bottom: 24px;">
            <div>
                <p style="font-size: 0.85rem; text-transform: uppercase; color: var(--text-muted); font-weight: 700; letter-spacing: 1px; margin-bottom: 4px;">Step 1 of 2</p>
                <h3 style="font-size: 1.5rem; color: var(--primary);">Your Information</h3>
            </div>
            <div style="text-align: right;">
                <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 4px;">Renting</p>
                <p style="font-weight: 700; color: var(--accent);">{{ bike.model_name }}</p>
            </div>
        </div>
        
        <form method="POST" action="{{ url_for('rental.user_info', bike_id=bike.id) }}">
            
            <div class="form-group">
                <input type="text" name="username" class="form-control" value="{{ user.username }}" readonly style="background-color: #f1f5f9; cursor: not-allowed; color: var(--text-muted);">
                <label class="floating-label" style="top: 0; font-size: 0.85rem; color: var(--accent); background: var(--white);">Username</label>
            </div>
            
            <div class="form-group">
                <input type="email" name="email" class="form-control" value="{{ user.email }}" readonly style="background-color: #f1f5f9; cursor: not-allowed; color: var(--text-muted);">
                <label class="floating-label" style="top: 0; font-size: 0.85rem; color: var(--accent); background: var(--white);">Email Address</label>
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="form-group">
                    <input type="date" name="start_date" class="form-control" required style="padding-top: 18px;">
                    <label class="floating-label" style="top: 0; font-size: 0.85rem; color: var(--accent); background: var(--white);">Pickup Date</label>
                </div>
                <div class="form-group">
                    <input type="date" name="end_date" class="form-control" required style="padding-top: 18px;">
                    <label class="floating-label" style="top: 0; font-size: 0.85rem; color: var(--accent); background: var(--white);">Return Date</label>
                </div>
            </div>

            <div class="form-group">
                <input type="tel" name="phone" class="form-control" placeholder=" " required>
                <label class="floating-label">Phone Number</label>
            </div>

            <button type="submit" class="btn btn-accent" style="width: 100%; margin-top: 16px;">Proceed to Payment <i class="fa-solid fa-arrow-right"></i></button>
        </form>
    </div>
</div>
{% endblock %}
